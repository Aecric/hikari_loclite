# hikari_loclite configuration for Livox Mid360

common:
  livox_lidar_topic: "/livox/lidar"
  pointcloud_topic: "/cloud"
  imu_topic: "/livox/imu"
  map_frame_id: "map"

system:
  map_path: ""                          # lightning 地图目录 (含 global.pcd / sc_database.bin 等); 为空时退回 fixed_map.global_pcd; CLI --map_path 优先级最高
  lidar_frame_id: "livox_frame"         # 雷达坐标系名称 (level_frame TF 的父 frame / odom 的 child frame)
  level_frame_id: "level_frame"         # 重力对齐水平坐标系名称 (纯旋转 TF 的子 frame)
  base_frame_id: "livox_frame"            # map → base_link TF 的子 frame
  base_to_lidar_x: 0.0                  # base_link → lidar 外参平移 x (m)
  base_to_lidar_y: 0.0                  # base_link → lidar 外参平移 y (m)
  base_to_lidar_z: 0.0                  # base_link → lidar 外参平移 z (m)
  base_to_lidar_roll: 0.0               # base_link → lidar 外参旋转 roll (rad), R = Rz(yaw)·Ry(pitch)·Rx(roll)
  base_to_lidar_pitch: 0.0              # base_link → lidar 外参旋转 pitch (rad)
  base_to_lidar_yaw: 0.0                # base_link → lidar 外参旋转 yaw (rad)
  external_pose_blackout_sec: 5.0       # /initialpose 注入后 SC 抢注阻断窗口 (秒, P5 SC 管线接入后生效)
  lost_timeout_sec: 5.0                 # Lost 持续超过该时长才转 WAIT_FOR_INITIALPOSE
  level_frame_cutoff_freq: 0.5          # 重力对齐低通滤波截止频率 (Hz)

  # ==== 稳定门控 (轻量版 lightning StabilityGate, 阈值默认照 lightning default_livox.yaml:131-137) ====
  # /initialpose 经 NDT 验证通过后先停在 Initializing (TF/odom 照发, 照 lightning 方案 B),
  # 滑窗内位姿抖动持续低于阈值且窗口覆盖 >= window_sec 才放行 Good.
  stability_gate_enabled: true          # false 时维持旧行为: NDT 验证通过即直接 Good
  stability_gate_trans_thres: 0.1       # 滑窗内最大平移抖动 (m)
  stability_gate_rot_thres_deg: 4.0     # 滑窗内最大旋转抖动 (deg)
  stability_gate_window_sec: 3.0        # 滑动窗口长度 (s)
  # conf_upper_thres: NDT TP >= 此值视为强可信验证, 不等窗口直接提前放行 Good; <=0 关闭提前放行.
  # TP 量纲同 ndt.min_confidence. Phase1 实测 (zt_5201_map, 雷达倾斜 62°, resolution=1.0):
  # 真位姿 TP 仅 ~1.3-1.4 (单档 + voxel_leaf=0.2 偏稀, TP 量纲塌陷), 远低于 lightning [1.5,5] 经验区间.
  # 取 1.3 = 贴本图真匹配水平: 一旦 NDT 验证 TP 达 1.3 即视为可信, 提前放行 Good, 不再死等滑窗.
  # 注意与 lightning 的 stability_gate_conf_upper_thres(=10, 高分伪匹配守门) 语义不同, 且本图 TP 量纲已塌陷,
  # 千万不要照抄 lightning 的数值 —— 应按现场 Validate 日志里的真匹配 TP 重标.
  stability_gate_conf_upper_thres: 1.3

reloc:
  init_max_retries: 5                   # /initialpose sticky retry 最大重试次数, 超过后放弃回 WAIT_FOR_INITIALPOSE
  init_accum_enabled: true              # MID360 初始化: /initialpose 后先原地累积 deskewed scan, 再跑 FC/NDT
  init_accum_min_frames: 10             # 累积窗口最少帧数
  init_accum_min_points: 8000           # 累积窗口最少原始点数
  init_accum_window_sec: 2.0            # 每个 FC/NDT 尝试前至少累积的时间
  init_accum_max_wait_sec: 5.0          # 单次 /initialpose 最长等待; 超过仍未验证成功则回 WAIT
  init_accum_voxel_leaf: 0.1            # 累积点云送入 FC/NDT 前的体素降采样 leaf

  # ==== SC 重定位 (Phase 5) ====
  sc_enabled: true                      # 是否启用 Scan Context 重定位
  auto_on_init: true                    # 冷启动时自动尝试 SC (不依赖 /initialpose)
  auto_on_lost: true                    # LOST 态自动 arm SC 恢复
  disable_after_good: true              # Good 态 disarm SC, 不消耗 CPU
  sc_top_k: 5                           # SC QueryTopK 候选数 (原 1; 多候选 + 重力检查 + NDT 验证逐个过滤)
  sc_cooldown_sec: 5.0                  # SC 尝试冷却时间 (秒)
  max_runtime_sec: 10.0                 # SC 重定位最大运行时间 (秒)
  sc_database: ""                       # SC 数据库路径; 为空时自动从 map_path/sc_database.bin 加载
  poses_txt: ""                         # 关键帧位姿路径; 为空时自动从 map_path/poses.txt 加载
  gravity_roll_thres_deg: 30.0          # SC 候选重力 roll 一致性阈值 (度)
  gravity_pitch_thres_deg: 30.0         # SC 候选重力 pitch 一致性阈值 (度)

  # ==== SC 查询域对齐 (Phase 3) ====
  # 描述子几何参数必须与建库侧 (lightning default_livox.yaml scan_context 段) 完全一致:
  # DB 文件只存 ring/sector, 不存 radius/height → 查询侧只能靠配置对齐, 错配 = 空候选/错候选.
  sc_pc_max_radius: 15.0                # SC 极坐标最大半径 (m); 必须与建库参数一致 (代码默认 80.0 错配)
  sc_lidar_height: 1.0                  # SC 建库雷达高度 (m); 必须与建库参数一致 (代码默认 2.0 错配)
  sc_dist_thres: 0.18                   # SC 距离阈值; lightning 同图实测可用值 (代码默认 0.13 过严)
  # 查询点云滚动累积: armed (init/LOST) 期间逐帧体素降采样入环形缓冲, SC 尝试时按相对 LIO
  # 位姿统一到最新帧 body 系合并 + 重力对齐后查询; 帧数不足时跳过尝试等下个 cooldown.
  sc_accum_frames: 20                   # 滚动累积帧数 (单帧太稀, 倾斜安装下 SC 描述子不稳定)
  sc_accum_voxel_leaf: 0.1              # 累积帧入队前 + 合并后的体素降采样 leaf (m); 控制 20 帧合计点数在几万点级
  sc_accum_max_rel_trans_m: 1.0         # 累积发散守门: 与上一入队帧相对平移超此值不入队 (LOST 后 LIO 速度积分跑飞实测 ~5m/帧, 拼接糊掉查询云); 不清空缓冲, 环形 pop 自然换血

  # ==== SC 候选验证专用 delta 门限 ====
  # 仅 SC 候选验证使用; /initialpose 验证保持 ndt.max_delta_* 原门限.
  # ndt.* 门限 (1m/10°) 按 /initialpose 量纲设定, 对 SC 候选过紧: SC sector 分辨率 360/60=6°,
  # yaw_diff 量化误差 + 斜装近似使正确候选 delta_rot 常落 6~12° (实测正确候选 dr=10.55° > 10°
  # 被拒, 而 TP=3.09 极好); 关键帧间距也使 delta_trans 可超 1m.
  sc_max_delta_trans_m: 2.0             # SC 候选 NDT 验证: 收敛位姿相对候选的平移上限 (m)
  sc_max_delta_rot_deg: 15.0            # SC 候选 NDT 验证: 收敛位姿相对候选的旋转上限 (deg)

runtime:
  publish_tf: true                      # map→base_link 与 lidar_frame→level_frame TF
  publish_odom: true                    # hikari_loc/odom
  publish_path: true                    # hikari_loc/path (0.1s 节流, 上限 5000; 契约接口默认开启)
  publish_pcdmap: true                 # 是否发布 /pcdmap: 原始 global.pcd 按 fixed_map.voxel_leaf 降采样后发布到 map frame, 供定位匹配验证

fixed_map:
  global_pcd: "/root/slam_ws/data/new_map/global.pcd"
  voxel_leaf: 0.2
  crop_radius_m: 80.0
  max_points: 8000000

fast_lio:
  filter_size_scan: 0.2
  filter_size_map: 0.2
  ivox_grid_resolution: 0.2
  ivox_nearby_type: 18
  max_iteration: 4
  min_pts: 300
  blind: 0.5
  max_range: 60.0
  lidar_type: 1
  scan_line: 6
  point_filter_num: 2
  time_scale: 0.001
  extrinsic_T: [-0.011, -0.02329, 0.04412]
  extrinsic_R: [1,0,0, 0,1,0, 0,0,1]
  gyr_cov: 0.01
  acc_cov: 0.01
  use_aa: false
  imu_filter: false
  skip_lidar_num: 0
  kf_dis_th: 2.0
  kf_angle_th: 15.0
  enable_icp_part: false
  proj_kfs: false
  esti_plane_threshold: 0.1
  max_lidar_residual_mean: 0.05       # LIO 点面残差 median(res^2) 上限; 超过视为坏匹配并进入 Degraded/Lost

roi:
  height_max: 3.0
  height_min: -1.0

ndt:
  enabled: true
  threads: 1                            # pclomp OMP 线程数; 嵌入式保持 1, 避免与 LIO 主链路抢核 (lightning P1 setNumThreads(1) 同款考量)
  resolution: 1.0                      # target 体素分辨率 (m); Mid360 室内 1.0m 足够 (lightning local_ndt 同款). Phase1: 单档不级联, 0.5 偏细令 TP 量纲塌陷, 回到 1.0
  source_leaf: 0.3                      # 源点云 (去畸变 scan) 降采样 leaf (m), 控制单次 Align 的 CPU 预算
  # min_confidence: NDT 置信度下限, 量纲为 pclomp getTransformationProbability() (TP),
  # 即"已匹配点的平均 Gaussian 密度" (配准得分 / 源点数), 与点云密度/场景结构相关.
  # Phase1 实测 (zt_5201_map, 雷达倾斜 62°, resolution=1.0, 地图 voxel_leaf=0.2):
  # 真位姿 TP 仅 ~1.3-1.4 (单档 + 稀疏图, TP 量纲塌陷, 见 lightning lidar_loc.cc:501 稀疏图 fine_conf 塌陷警告),
  # 远低于 lightning [1.5,5] 经验区间. 用 1.5 会把真匹配也卡掉 (init验证/GOOD校正/SC验证三门全断).
  # 故 Phase1 取 1.0 = 真匹配 ~1.3-1.4 留 ~0.3 余量过, 伪匹配 ~0.15-0.6 仍拒. 不要再照搬 lightning 的 [1.5,5].
  # 现场标定方法: 看 Validate 日志里真位姿的 TP, 在其下方留 ~0.3 余量取值 (不建议 <0.8).
  min_confidence: 1.0
  # inlier 覆盖率正交门 (Phase1 新增): 降采样源点用收敛位姿变换后, 在 inlier_dist_m 内能找到 target 近邻的占比.
  # 与 TP 互补 (TP 是 Gaussian 密度, inlier 是几何覆盖率), 防 TP 量纲塌陷时单门误收伪匹配.
  min_inlier_ratio: 0.0                 # 0 = 仅记录不门控 (Phase1 默认, 先看日志标定); >0 才作为正交门拒绝
  inlier_dist_m: 1.0                    # inlier 判定距离: 变换后源点到 target 最近邻 < 此值算 inlier (m)
  max_delta_trans_m: 1.0                # Validate: 收敛位姿相对候选 guess 的平移上限 (m)
  max_delta_rot_deg: 10.0               # Validate: 收敛位姿相对候选 guess 的旋转上限 (deg)
  good_rate_hz: 1.0                     # GOOD 态低频 NDT 漂移校正频率 (Hz, 按时间间隔判断而非帧数)
  gain_good: 0.5                        # GOOD 态 NDT 校正增益 (0~1, 增益混合后 ResetToMapPose)
  # Phase2: 退化检测 (Hessian 特征值分析, 长走廊/平面/开阔地场景下 NDT 可能收敛到错误解且 TP 仍偏高)
  degeneracy_ratio_threshold: 50.0      # lambda_max/lambda_min 超此值判退化 (走廊/平面典型 50~100)
  degeneracy_min_ev_threshold: 10.0     # lambda_min 低于此绝对值判退化 (特征值与 TP 同量纲)
  degeneracy_reject_in_validate: true   # Validate 中退化直接拒绝 (init/SC 候选)

smoother:
  # LitePoseSmoother 跳变门限 (Phase1 改为可配; 缺省即下列新值).
  # max_correction 从 0.3m/5° 放宽到 0.5m/8°: TP 门已正确标定 (1.0) + inlier 兜底, 中等漂移可拉回;
  # 大漂移 (>0.5m) 不是 GOOD 态微调的职责, 交后续 Phase 的状态机降级 + SC 重定位.
  max_output_jump_trans_m: 0.5          # Fast-LIO 输出位姿单帧平移跳变上限 (m), 超过保留上一帧
  max_output_jump_rot_deg: 15.0         # Fast-LIO 输出位姿单帧旋转跳变上限 (deg)
  max_correction_trans_m: 0.5           # GOOD 态 NDT 校正相对 fast_pose 的平移上限 (m), 超过整帧拒绝校正
  max_correction_rot_deg: 8.0           # GOOD 态 NDT 校正相对 fast_pose 的旋转上限 (deg)
